<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0920" />
    <title>Sruthi 2.o</title>
    <link rel="icon" type="image/png" href="/Icon.png" />
    <link rel="apple-touch-icon" href="/Icon.png" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="brand">
          <img src="/Icon.png" alt="Sruthi" width="40" height="40" />
          <div>
            <strong>Sruthi 2.o</strong>
            <span>Premium music player</span>
          </div>
        </div>
        <label class="search-bar">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input id="search-input" type="search" placeholder="Search songs, albums, artists..." autocomplete="off" inputmode="search" />
          <span id="search-status" class="search-status"></span>
        </label>
      </header>

      <nav class="tabs" role="tablist">
        <button class="tab is-active" data-tab="home">Home</button>
        <button class="tab" data-tab="albums">Albums</button>
        <button class="tab" data-tab="favorites">Favorites</button>
        <button class="tab" data-tab="playlists">Playlists</button>
      </nav>

      <main id="main"></main>

      <footer id="player" class="player" hidden>
        <img id="player-art" src="/Icon.png" alt="" />
        <div class="player-meta">
          <strong id="player-title">—</strong>
          <span id="player-artist">—</span>
          <div class="player-bar">
            <span id="player-bar-fill"></span>
          </div>
        </div>
        <div class="player-actions">
          <button id="player-prev" aria-label="Previous">⏮</button>
          <button id="player-play" class="player-play" aria-label="Play/pause">▶</button>
          <button id="player-next" aria-label="Next">⏭</button>
        </div>
        <audio id="player-audio" preload="auto"></audio>
      </footer>
    </div>
    <script src="/app.js" defer></script>
  </body>
</html>
