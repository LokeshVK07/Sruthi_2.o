name: Refresh Library Snapshot

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      full_refresh:
        description: "Run a full catalog refresh across page-wise and movie-index sources"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: refresh-library-snapshot
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      SNAPSHOT_DIR: ${{ runner.temp }}/vibe2o-refresh
      SNAPSHOT_NAME: vibe2o-library.sqlite3

    steps:
      - name: Resolve refresh mode
        run: |
          set -euo pipefail
          full_refresh="false"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && "${{ inputs.full_refresh }}" == "true" ]]; then
            full_refresh="true"
          fi
          echo "VIBE_FULL_REFRESH=${full_refresh}" >> "${GITHUB_ENV}"

      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r apps/api/requirements.txt

      - name: Install frontend dependencies
        run: npm ci

      - name: Ensure library release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view library-snapshot --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1 || \
            gh release create library-snapshot --repo "${GITHUB_REPOSITORY}" --title "Library Snapshot" --notes "Managed library snapshot release"

      - name: Prepare working database
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p "${SNAPSHOT_DIR}"
          export SNAPSHOT_DB="${SNAPSHOT_DIR}/${SNAPSHOT_NAME}"
          if gh release download library-snapshot --repo "${GITHUB_REPOSITORY}" --pattern "${SNAPSHOT_NAME}" --dir "${SNAPSHOT_DIR}" >/dev/null 2>&1; then
            echo "Using previously published snapshot."
          else
            cp apps/api/data/melodify.sqlite3 "${SNAPSHOT_DB}"
            echo "Using repository snapshot as fallback seed."
          fi
          echo "SNAPSHOT_DB=${SNAPSHOT_DB}" >> "${GITHUB_ENV}"

      - name: Run catalog refresh
        env:
          DATABASE_PATH: ${{ env.SNAPSHOT_DB }}
        working-directory: apps/api
        run: |
          python -m app.scripts.init_db
          if [[ "${VIBE_FULL_REFRESH}" == "true" ]]; then
            python -m app.scripts.refresh_catalog --full
          else
            python -m app.scripts.refresh_catalog
          fi

      - name: Validate refreshed snapshot
        run: |
          python scripts/validate_snapshot_with_duckdb.py \
            --db-path "${SNAPSHOT_DB}" \
            --previous-manifest apps/api/data/library-manifest.json \
            --summary-path "${SNAPSHOT_DIR}/validation-summary.json"

      - name: Build app
        run: npm run build

      - name: Build manifest
        env:
          DOWNLOAD_URL: https://github.com/${{ github.repository }}/releases/download/library-snapshot/${{ env.SNAPSHOT_NAME }}
        run: |
          VERSION="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          python scripts/publish_snapshot_manifest.py \
            --db-path "${SNAPSHOT_DB}" \
            --manifest-path apps/api/data/library-manifest.json \
            --download-url "${DOWNLOAD_URL}" \
            --version "${VERSION}"

      - name: Upload snapshot asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload library-snapshot "${SNAPSHOT_DB}#${SNAPSHOT_NAME}" --repo "${GITHUB_REPOSITORY}" --clobber

      - name: Commit manifest changes
        run: |
          if git diff --quiet -- apps/api/data/library-manifest.json; then
            echo "No manifest change to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/api/data/library-manifest.json
          git commit -m "chore(data): refresh library manifest"
          git push origin HEAD:main
