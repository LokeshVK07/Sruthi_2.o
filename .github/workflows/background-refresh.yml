name: Background Refresh Vibe 2.o

on:
  workflow_dispatch:
    inputs:
      full_refresh:
        description: Run a full catalog refresh instead of incremental mode
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write
  actions: write

concurrency:
  group: vibe2o-background-refresh
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  refresh-and-publish:
    name: Refresh and Publish Vibe 2.o Catalog
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install workflow dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r apps/api/requirements.txt
          npm install

      - name: Validate workflow configuration
        run: |
          set -euo pipefail

          required_files=(
            ".github/workflows/background-refresh.yml"
            "apps/api/requirements.txt"
            "apps/api/app/scripts/init_db.py"
            "apps/api/app/scripts/refresh_catalog.py"
            "scripts/publish_snapshot_manifest.py"
            "scripts/validate_snapshot_with_duckdb.py"
            "apps/api/data/melodify.sqlite3"
            "package-lock.json"
            "package.json"
          )

          for file in "${required_files[@]}"; do
            if [[ ! -e "$file" ]]; then
              echo "::error::Required workflow file is missing: $file"
              exit 1
            fi
          done

      - name: Resolve run mode
        run: |
          set -euo pipefail
          full_refresh="false"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && "${{ inputs.full_refresh }}" == "true" ]]; then
            full_refresh="true"
          fi
          echo "VIBE_FULL_REFRESH=${full_refresh}" >> "$GITHUB_ENV"

      - name: Prepare workflow paths
        run: |
          set -euo pipefail
          snapshot_dir="${RUNNER_TEMP}/vibe2o-refresh"
          generated_dir=".github/.generated/background-refresh"
          mkdir -p "${snapshot_dir}" "${generated_dir}"
          echo "SNAPSHOT_DIR=${snapshot_dir}" >> "$GITHUB_ENV"
          echo "SNAPSHOT_NAME=vibe2o-library.sqlite3" >> "$GITHUB_ENV"
          echo "GENERATED_MANIFEST=${generated_dir}/library-manifest.json" >> "$GITHUB_ENV"
          echo "VALIDATION_SUMMARY=${generated_dir}/validation-summary.json" >> "$GITHUB_ENV"

      - name: Ensure library release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release view library-snapshot --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1 || \
            gh release create library-snapshot --repo "${GITHUB_REPOSITORY}" --title "Library Snapshot" --notes "Managed library snapshot release"

      - name: Prepare working database
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p "${SNAPSHOT_DIR}"
          export SNAPSHOT_DB="${SNAPSHOT_DIR}/${SNAPSHOT_NAME}"
          if gh release download library-snapshot --repo "${GITHUB_REPOSITORY}" --pattern "${SNAPSHOT_NAME}" --dir "${SNAPSHOT_DIR}" >/dev/null 2>&1; then
            echo "Using previously published snapshot."
          else
            cp apps/api/data/melodify.sqlite3 "${SNAPSHOT_DB}"
            echo "Using repository snapshot as fallback seed."
          fi
          echo "SNAPSHOT_DB=${SNAPSHOT_DB}" >> "${GITHUB_ENV}"

      - name: Refresh catalog from MassTamilan
        env:
          DATABASE_PATH: ${{ env.SNAPSHOT_DB }}
        working-directory: apps/api
        run: |
          set -euo pipefail
          python -m app.scripts.init_db
          if [[ "${VIBE_FULL_REFRESH}" == "true" ]]; then
            python -m app.scripts.refresh_catalog --full
          else
            python -m app.scripts.refresh_catalog
          fi

      - name: Validate refreshed local catalog files
        run: |
          set -euo pipefail
          if [[ ! -f "${SNAPSHOT_DB}" ]]; then
            echo "::error::Expected ${SNAPSHOT_DB} to exist after refresh."
            exit 1
          fi
          if [[ ! -s "${SNAPSHOT_DB}" ]]; then
            echo "::error::${SNAPSHOT_DB} exists but is empty."
            exit 1
          fi

      - name: Validate catalog and build release manifest
        run: |
          set -euo pipefail
          DOWNLOAD_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/library-snapshot/${SNAPSHOT_NAME}"
          python scripts/validate_snapshot_with_duckdb.py \
            --db-path "${SNAPSHOT_DB}" \
            --previous-manifest apps/api/data/library-manifest.json \
            --summary-path "${VALIDATION_SUMMARY}"

          VERSION="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          python scripts/publish_snapshot_manifest.py \
            --db-path "${SNAPSHOT_DB}" \
            --manifest-path "${GENERATED_MANIFEST}" \
            --download-url "${DOWNLOAD_URL}" \
            --version "${VERSION}"

          if [[ ! -f "${GENERATED_MANIFEST}" ]]; then
            echo "::error::Release manifest was not generated."
            exit 1
          fi

      - name: Build app before publish
        run: |
          set -euo pipefail
          npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vibe2o-refresh-artifacts
          if-no-files-found: error
          path: |
            ${{ env.GENERATED_MANIFEST }}
            ${{ env.VALIDATION_SUMMARY }}

      - name: Publish snapshot asset after successful validation and build
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release upload library-snapshot "${SNAPSHOT_DB}#${SNAPSHOT_NAME}" --repo "${GITHUB_REPOSITORY}" --clobber

      - name: Publish manifest after successful snapshot upload
        run: |
          set -euo pipefail
          cp "${GENERATED_MANIFEST}" apps/api/data/library-manifest.json
          if git diff --quiet -- apps/api/data/library-manifest.json; then
            echo "No manifest change to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/api/data/library-manifest.json
          git commit -m "chore(data): refresh library manifest"
          git push origin HEAD:main
