name: Refresh Library Snapshot

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:
    inputs:
      scan_mode:
        description: "Scrape mode passed to refresh_catalog.py"
        required: false
        default: "all"
      full_scan:
        description: "Run in full scan mode"
        required: false
        default: "true"
      delay:
        description: "Delay between page fetches"
        required: false
        default: "1.3"
      publish_ref:
        description: "Git ref used for manifest updates and push target"
        required: false
        default: "main"

permissions:
  contents: write
  actions: write

concurrency:
  group: refresh-library
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.publish_ref || 'main' }}
          fetch-depth: 0

      - name: Define retry helper
        run: |
          cat > /tmp/retry.sh <<'EOF'
          retry() {
            local attempts="$1"
            local sleep_seconds="$2"
            shift 2
            local n=1
            while true; do
              "$@" && break
              if [ "$n" -ge "$attempts" ]; then
                echo "Command failed after $n attempt(s): $*"
                return 1
              fi
              echo "Attempt $n failed. Retrying in ${sleep_seconds}s: $*"
              sleep "$sleep_seconds"
              n=$((n + 1))
            done
          }
          EOF

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install scraper dependencies
        run: |
          source /tmp/retry.sh
          retry 3 20 python -m pip install --upgrade pip
          retry 3 30 python -m pip install -r apps/api/requirements.txt
          retry 2 60 python -m playwright install --with-deps chromium
          retry 3 30 npm install

      - name: Ensure data directories exist
        run: mkdir -p data exports apps/api/data .github/.generated/background-refresh

      - name: Resolve workflow paths
        run: |
          echo "WORKING_SQLITE_DB=${GITHUB_WORKSPACE}/data/melodify.sqlite3" >> "$GITHUB_ENV"
          echo "GENERATED_MANIFEST=${GITHUB_WORKSPACE}/.github/.generated/background-refresh/library-manifest.json" >> "$GITHUB_ENV"
          echo "VALIDATION_SUMMARY=${GITHUB_WORKSPACE}/.github/.generated/background-refresh/validation-summary.json" >> "$GITHUB_ENV"

      - name: Ensure library release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view library-snapshot --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1 || \
            gh release create library-snapshot --repo "${GITHUB_REPOSITORY}" --title "Library Snapshot" --notes "Managed SQLite library snapshot release"

      - name: Download current published DB
        run: |
          source /tmp/retry.sh
          DOWNLOAD_URL="$(python - <<'PY'
          import json
          from pathlib import Path
          manifest = json.loads(Path("apps/api/data/library-manifest.json").read_text())
          print(manifest["download_url"])
          PY
          )"
          retry 3 20 curl -fL --retry 3 --retry-delay 20 -o "${WORKING_SQLITE_DB}" "${DOWNLOAD_URL}"

      - name: Back up current published DB
        uses: actions/upload-artifact@v4
        with:
          name: sqlite-backup-${{ github.run_id }}
          path: ${{ env.WORKING_SQLITE_DB }}
          retention-days: 30

      - name: Run scraper
        env:
          INPUT_SCAN_MODE: ${{ github.event.inputs.scan_mode || 'all' }}
          INPUT_FULL_SCAN: ${{ github.event.inputs.full_scan || 'true' }}
          INPUT_DELAY: ${{ github.event.inputs.delay || '1.3' }}
          DATABASE_PATH: ${{ env.WORKING_SQLITE_DB }}
          MASSTAMILAN_USE_PLAYWRIGHT: "true"
          MASSTAMILAN_PLAYWRIGHT_TIMEOUT_MS: "45000"
        working-directory: apps/api
        run: |
          source /tmp/retry.sh
          if [ "${INPUT_FULL_SCAN}" = "true" ]; then
            FULL_FLAG="--full"
          else
            FULL_FLAG=""
          fi
          retry 2 120 python -m app.scripts.refresh_catalog --mode "${INPUT_SCAN_MODE}" --delay "${INPUT_DELAY}" ${FULL_FLAG}

      - name: Summarize scrape metrics
        run: |
          python - <<'PY'
          import json
          import os
          import sqlite3

          db_path = os.environ["WORKING_SQLITE_DB"]
          conn = sqlite3.connect(db_path)
          row = conn.execute(
              """
              SELECT status, pages_scraped, albums_new, albums_updated, albums_failed, songs_total, started_at, finished_at
              FROM scrape_runs
              ORDER BY started_at DESC
              LIMIT 1
              """
          ).fetchone()
          if row is None:
              raise SystemExit("No scrape_runs row found after scraper execution")
          print(
              json.dumps(
                  {
                      "status": row[0],
                      "pages_scraped": row[1],
                      "albums_new": row[2],
                      "albums_updated": row[3],
                      "albums_failed": row[4],
                      "songs_total": row[5],
                      "started_at": row[6],
                      "finished_at": row[7],
                  },
                  indent=2,
              )
          )
          PY

      - name: Validate refreshed local catalog files
        run: |
          if [[ ! -f "${WORKING_SQLITE_DB}" ]]; then
            echo "::error::Expected ${WORKING_SQLITE_DB} to exist after refresh."
            exit 1
          fi
          if [[ ! -s "${WORKING_SQLITE_DB}" ]]; then
            echo "::error::${WORKING_SQLITE_DB} exists but is empty."
            exit 1
          fi
          python scripts/validate_snapshot_with_duckdb.py \
            --db-path "${WORKING_SQLITE_DB}" \
            --previous-manifest apps/api/data/library-manifest.json \
            --summary-path "${VALIDATION_SUMMARY}"

      - name: Build app before publish
        run: npm run build

      - name: Build release manifest
        env:
          INPUT_PUBLISH_REF: ${{ github.event.inputs.publish_ref || 'main' }}
        run: |
          VERSION="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          python scripts/publish_snapshot_manifest.py \
            --db-path "${WORKING_SQLITE_DB}" \
            --manifest-path "${GENERATED_MANIFEST}" \
            --download-url "https://github.com/${GITHUB_REPOSITORY}/releases/download/library-snapshot/vibe2o-library.sqlite3" \
            --version "${VERSION}"

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload library-snapshot "${WORKING_SQLITE_DB}#vibe2o-library.sqlite3" --repo "${GITHUB_REPOSITORY}" --clobber

      - name: Publish committed manifest
        run: |
          cp "${GENERATED_MANIFEST}" apps/api/data/library-manifest.json

      - name: Detect repository changes
        id: changes
        run: |
          if git diff --quiet -- apps/api/data/library-manifest.json; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
          else
            echo "changed=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Commit refreshed library
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/api/data/library-manifest.json
          git commit -m "chore(data): refresh library manifest"

      - name: Push refreshed library
        if: steps.changes.outputs.changed == 'true'
        env:
          PUBLISH_REF: ${{ github.event.inputs.publish_ref || 'main' }}
        run: |
          for attempt in 1 2 3 4 5; do
            if git push origin "HEAD:${PUBLISH_REF}"; then
              echo "Pushed on attempt ${attempt}."
              exit 0
            fi
            echo "Push rejected on attempt ${attempt}; rebasing onto origin/${PUBLISH_REF}."
            git fetch origin "${PUBLISH_REF}"
            git rebase "origin/${PUBLISH_REF}"
            sleep 5
          done
          echo "Failed to push after 5 attempts." >&2
          exit 1

      - name: Summarize
        run: |
          if [ "${{ steps.changes.outputs.changed }}" = "true" ]; then
            echo "Library snapshots changed and manifests were pushed."
          else
            echo "Library snapshots unchanged; nothing pushed."
          fi
