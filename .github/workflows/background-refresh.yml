name: Background Refresh Vibe 2.o

on:
  workflow_dispatch:
    inputs:
      full_refresh:
        description: Run a full catalog refresh instead of incremental mode
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: read
  actions: write

concurrency:
  group: sruthi-background-refresh-tamil
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  refresh-and-deploy:
    name: Refresh and Deploy Tamil
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      GH_VARIABLES_TOKEN: ${{ secrets.GH_VARIABLES_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      SRUTHI_ACTIVE_D1_SLOT: ${{ vars.SRUTHI_ACTIVE_D1_SLOT }}
      SRUTHI_D1_DB_A_ID: ${{ vars.SRUTHI_D1_DB_A_ID }}
      SRUTHI_D1_DB_A_NAME: ${{ vars.SRUTHI_D1_DB_A_NAME }}
      SRUTHI_D1_DB_B_ID: ${{ vars.SRUTHI_D1_DB_B_ID }}
      SRUTHI_D1_DB_B_NAME: ${{ vars.SRUTHI_D1_DB_B_NAME }}
      WRANGLER_SEND_METRICS: "false"
      WRANGLER_BIN: wrangler
      CI: "true"
      GENERATED_WRANGLER_CONFIG: cloudflare/.generated/wrangler.deploy.jsonc
      RELEASE_MANIFEST: cloudflare/.generated/release-manifest.json
      RELEASE_DUCKDB: cloudflare/.generated/release-check.duckdb
      REFRESH_REPORT: cloudflare/.generated/refresh-report.json
      BASELINE_DB: data/sruthi.baseline.sqlite3
      WORKER_NAME: ${{ vars.WORKER_NAME }}
      SRUTHI_WORKER_URL: ${{ vars.SRUTHI_WORKER_URL || vars.WORKER_PUBLIC_URL }}
      SCRAPER_PROJECT_NAME: Vibe 2.o
      REFRESH_DISCOVERY_MODE: ${{ vars.SRUTHI_REFRESH_MODE || 'pagewise' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install workflow dependencies
        env:
          # The background refresh is HTTP-only: cloudscraper/requests +
          # BeautifulSoup/lxml. Do not download browser binaries in Actions.
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          # The scraper (apps/api/app/scripts/refresh_catalog.py) imports
          # pydantic, fastapi, httpx, lxml, tenacity, cloudscraper, requests,
          # etc. via apps/api/app — install the canonical requirements file so every
          # transitive import resolves. We also pin `requests`, which a few
          # tools/ helpers use but isn't in apps/api/requirements.txt.
          python -m pip install -r apps/api/requirements.txt requests
          # Belt-and-suspenders: import every module the scrape transitively
          # needs *now*, while we still have a clean error message. If
          # something went wrong with the resolver we'd rather fail at this
          # step than produce a confusing ModuleNotFoundError later.
          python - <<'PY'
          import importlib, sys
          required = [
              "pydantic", "fastapi", "httpx", "lxml", "tenacity",
              "duckdb", "cloudscraper", "bs4", "requests",
          ]
          missing = []
          for name in required:
              try:
                  importlib.import_module(name)
              except Exception as exc:
                  missing.append(f"{name} ({exc})")
          if missing:
              sys.stderr.write("Missing/broken imports after pip install:\n")
              for line in missing:
                  sys.stderr.write(f"  - {line}\n")
              raise SystemExit(1)
          print("All required Python modules import cleanly.")
          PY
          npm install --global wrangler@4.81.1
          wrangler --version

      - name: Validate workflow configuration
        run: |
          set -euo pipefail

          missing=()
          for key in \
            CLOUDFLARE_API_TOKEN \
            GH_VARIABLES_TOKEN \
            CLOUDFLARE_ACCOUNT_ID \
            SRUTHI_D1_DB_A_ID \
            SRUTHI_D1_DB_A_NAME \
            SRUTHI_D1_DB_B_ID \
            SRUTHI_D1_DB_B_NAME; do
            if [[ -z "${!key:-}" ]]; then
              missing+=("$key")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            echo "::error::Missing required GitHub Actions secrets/variables: ${missing[*]}"
            exit 1
          fi

          if [[ "${SRUTHI_D1_DB_A_ID}" == "${SRUTHI_D1_DB_B_ID}" ]]; then
            echo "::error::D1 slot A and B database ids must be different."
            exit 1
          fi

          if [[ "${SRUTHI_D1_DB_A_NAME}" == "${SRUTHI_D1_DB_B_NAME}" ]]; then
            echo "::error::D1 slot A and B database names must be different."
            exit 1
          fi

          if [[ -n "${SRUTHI_ACTIVE_D1_SLOT:-}" && "${SRUTHI_ACTIVE_D1_SLOT}" != "A" && "${SRUTHI_ACTIVE_D1_SLOT}" != "B" ]]; then
            echo "::error::SRUTHI_ACTIVE_D1_SLOT must be A or B when configured."
            exit 1
          fi
          if [[ -n "${SRUTHI_WORKER_URL:-}" && ! "${SRUTHI_WORKER_URL}" =~ ^https?:// ]]; then
            echo "::error::SRUTHI_WORKER_URL must start with http:// or https:// when configured."
            exit 1
          fi
          if [[ "${REFRESH_DISCOVERY_MODE}" != "pagewise" && "${REFRESH_DISCOVERY_MODE}" != "movie-index" && "${REFRESH_DISCOVERY_MODE}" != "all" ]]; then
            echo "::error::SRUTHI_REFRESH_MODE must be one of: pagewise, movie-index, all."
            exit 1
          fi

          python - <<'PY'
          import os
          import sys
          import uuid

          for key in ("SRUTHI_D1_DB_A_ID", "SRUTHI_D1_DB_B_ID"):
              try:
                  uuid.UUID(os.environ[key])
              except ValueError:
                  print(f"::error::{key} must be a D1 database UUID.", file=sys.stderr)
                  raise SystemExit(1)
          PY

          required_files=(
            ".github/workflows/background-refresh.yml"
            "cloudflare/wrangler.jsonc"
            "cloudflare/src/worker.js"
            "cloudflare/public/index.html"
            "cloudflare/public/app.js"
            "cloudflare/public/styles.css"
            "cloudflare/scripts/render_wrangler_config.py"
            "cloudflare/scripts/prepare_release.py"
            "cloudflare/scripts/export_d1_sql.py"
            "cloudflare/data/release-baseline.json"
            "tools/masstamilan_refresh.py"
            "server.py"
          )

          for file in "${required_files[@]}"; do
            if [[ ! -e "$file" ]]; then
              echo "::error::Required workflow file is missing: $file"
              exit 1
            fi
          done

          node --check cloudflare/src/worker.js
          python cloudflare/scripts/validate_wrangler_config.py \
            cloudflare/wrangler.jsonc \
            --require-database-id

      - name: Resolve run mode
        env:
          REQUESTED_FULL_REFRESH: ${{ github.event_name == 'workflow_dispatch' && inputs.full_refresh || false }}
        run: |
          set -euo pipefail
          full_refresh="false"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && "${REQUESTED_FULL_REFRESH}" == "true" ]]; then
            full_refresh="true"
          fi
          if [[ "${SCRAPER_FULL_REFRESH:-false}" == "true" ]]; then
            full_refresh="true"
          fi
          echo "SRUTHI_FULL_REFRESH=${full_refresh}" >> "$GITHUB_ENV"

      - name: Verify Cloudflare token and account access
        run: |
          set -euo pipefail
          if ! wrangler whoami >/tmp/wrangler-whoami.txt 2>/tmp/wrangler-whoami.err; then
            echo "::error::Wrangler authentication check failed. Ensure CLOUDFLARE_API_TOKEN includes Workers, D1, and account membership access, and CLOUDFLARE_ACCOUNT_ID is correct."
            cat /tmp/wrangler-whoami.err
            exit 1
          fi

      - name: Select inactive D1 slot
        run: |
          set -euo pipefail
          active="${SRUTHI_ACTIVE_D1_SLOT:-A}"
          if [[ "$active" == "A" ]]; then
            target="B"
            db_id="${SRUTHI_D1_DB_B_ID}"
            db_name="${SRUTHI_D1_DB_B_NAME}"
          else
            target="A"
            db_id="${SRUTHI_D1_DB_A_ID}"
            db_name="${SRUTHI_D1_DB_A_NAME}"
          fi

          echo "TARGET_DB_ID=$db_id" >> "$GITHUB_ENV"
          echo "TARGET_DB_NAME=$db_name" >> "$GITHUB_ENV"
          echo "TARGET_SLOT=$target" >> "$GITHUB_ENV"

      - name: Verify GitHub variable update token access
        env:
          GH_TOKEN: ${{ secrets.GH_VARIABLES_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "::error::Missing required secret GH_VARIABLES_TOKEN. Create this repository secret before running the workflow."
            exit 1
          fi

          if [[ "${TARGET_SLOT}" != "A" && "${TARGET_SLOT}" != "B" ]]; then
            echo "::error::Resolved TARGET_SLOT must be A or B, got '${TARGET_SLOT}'."
            exit 1
          fi

          if ! gh auth status >/tmp/gh-auth.txt 2>/tmp/gh-auth.err; then
            echo "::error::GH_VARIABLES_TOKEN could not authenticate with GitHub CLI."
            cat /tmp/gh-auth.err
            exit 1
          fi

          set +e
          gh api "repos/${GITHUB_REPOSITORY}/actions/variables/SRUTHI_ACTIVE_D1_SLOT" >/tmp/slot-var.json 2>/tmp/slot-var.err
          status=$?
          set -e

          if [[ $status -eq 0 ]]; then
            echo "Verified repository variable API access for SRUTHI_ACTIVE_D1_SLOT."
          elif grep -q "404" /tmp/slot-var.err; then
            echo "SRUTHI_ACTIVE_D1_SLOT does not exist yet; workflow will create it after a successful deploy."
          else
            echo "::error::GH_VARIABLES_TOKEN does not have the required repository variables access."
            cat /tmp/slot-var.err
            exit 1
          fi

      - name: Render deployment Wrangler config
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "${GENERATED_WRANGLER_CONFIG}")"
          render_args=(
            --input cloudflare/wrangler.jsonc
            --output "${GENERATED_WRANGLER_CONFIG}"
            --database-id "${TARGET_DB_ID}"
            --database-name "${TARGET_DB_NAME}"
            --account-id "${CLOUDFLARE_ACCOUNT_ID}"
          )
          if [[ -n "${WORKER_NAME:-}" ]]; then
            render_args+=(--worker-name "${WORKER_NAME}")
          fi
          python cloudflare/scripts/render_wrangler_config.py "${render_args[@]}"

          if [[ ! -f "${GENERATED_WRANGLER_CONFIG}" ]]; then
            echo "::error::Rendered Wrangler config was not created."
            exit 1
          fi

      - name: Validate rendered deployment config
        run: |
          set -euo pipefail
          python cloudflare/scripts/validate_wrangler_config.py \
            "${GENERATED_WRANGLER_CONFIG}" \
            --require-database-id \
            --require-account-id

      - name: Verify D1 slot access
        run: |
          set -euo pipefail
          for slot in A B; do
            name_key="SRUTHI_D1_DB_${slot}_NAME"
            id_key="SRUTHI_D1_DB_${slot}_ID"
            db_name="${!name_key}"
            db_id="${!id_key}"
            echo "Checking D1 slot ${slot}: ${db_name} (${db_id})"
            if ! wrangler d1 execute "${db_name}" \
              --remote \
              --command "SELECT 1 AS ok;" \
              --config "${GENERATED_WRANGLER_CONFIG}" \
              --json >"/tmp/d1-${slot}.json" 2>"/tmp/d1-${slot}.err"; then
              echo "::error::Cannot query D1 slot ${slot} (${db_name}). Check the D1 database name/id variables and Cloudflare token D1 permissions."
              cat "/tmp/d1-${slot}.err"
              exit 1
            fi
          done

      - name: Bootstrap working DB from committed catalogue
        # Scheduled/incremental refresh starts from the committed catalogue so
        # known pages can stop early. Manual full refresh starts from scratch so
        # successful runs produce "Listing page N: 10 albums, 10 new".
        run: |
          set -euo pipefail
          src="apps/api/data/melodify.sqlite3"
          dst="${BASELINE_DB}"
          if [[ ! -f "$src" ]]; then
            echo "::error::Committed baseline DB not found at $src. Refusing to start from an empty DB."
            exit 1
          fi
          mkdir -p "$(dirname "$dst")"
          cp "$src" "$dst"
          if [[ "${SRUTHI_FULL_REFRESH}" == "true" ]]; then
            rm -f data/sruthi.db data/sruthi.db-wal data/sruthi.db-shm
            start_mode="fresh full source crawl"
          else
            mkdir -p data
            cp "$src" data/sruthi.db
            rm -f data/sruthi.db-wal data/sruthi.db-shm
            start_mode="incremental refresh from committed catalogue"
          fi
          python - <<'PY'
          import os
          import sqlite3
          conn = sqlite3.connect(f"file:{os.environ['BASELINE_DB']}?mode=ro", uri=True)
          albums = conn.execute("SELECT COUNT(*) FROM albums").fetchone()[0]
          songs = conn.execute("SELECT COUNT(*) FROM songs").fetchone()[0]
          conn.close()
          print(f"Stored fallback baseline DB: {albums:,} albums, {songs:,} songs.")
          PY
          echo "Refresh start mode: ${start_mode}"

      - name: Refresh catalog from MassTamilan
        id: refresh
        # HTTP-only protected-source scrape. If upstream limits the runner, the
        # scraper exits non-zero with a blocked report; the job then skips
        # publish/deploy without replacing the current live catalog.
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          set -euo pipefail
          echo "publish_ready=false" >> "$GITHUB_OUTPUT"

          if [[ "${SRUTHI_FULL_REFRESH}" == "true" ]]; then
            export SCRAPER_LISTING_DELAY_SECONDS="8"
            export SCRAPER_DETAIL_DELAY_SECONDS="3"
            export SCRAPER_JITTER_SECONDS="2"
            export SCRAPER_MAX_ATTEMPTS="3"
            export SCRAPER_RETRY_BASE_DELAY_SECONDS="8"
            export SCRAPER_RETRY_MAX_DELAY_SECONDS="45"
            export SCRAPER_LIMITER_COOLDOWN_SECONDS="60"
            export SCRAPER_LIMITER_MAX_COOLDOWN_SECONDS="300"
            export SCRAPER_MAX_LIMITER_STREAK="4"
            export SCRAPER_ABORT_ON_PAGE1_LIMITED="true"
            workers="${SCRAPER_WORKERS:-1}"
            mode_label="FULL ${REFRESH_DISCOVERY_MODE^^} DISCOVERY"
            args=(
              --full
              --mode "${REFRESH_DISCOVERY_MODE}"
              --workers "${workers}"
              --batch-size 3
              --page-delay "${SCRAPER_LISTING_DELAY_SECONDS}"
              --album-delay "${SCRAPER_DETAIL_DELAY_SECONDS}"
              --retry-count "${SCRAPER_MAX_ATTEMPTS}"
              --retry-base-delay "${SCRAPER_RETRY_BASE_DELAY_SECONDS}"
              --retry-max-delay "${SCRAPER_RETRY_MAX_DELAY_SECONDS}"
              --stop-after-known-pages 2
              --movie-index-stop-after-known-pages 120
              --max-limiter-streak "${SCRAPER_MAX_LIMITER_STREAK}"
              --abort-on-page1-limited
              --report-path "${REFRESH_REPORT}"
            )
          else
            export SCRAPER_LISTING_DELAY_SECONDS="4"
            export SCRAPER_DETAIL_DELAY_SECONDS="2"
            export SCRAPER_JITTER_SECONDS="1.5"
            export SCRAPER_MAX_ATTEMPTS="2"
            export SCRAPER_RETRY_BASE_DELAY_SECONDS="6"
            export SCRAPER_RETRY_MAX_DELAY_SECONDS="30"
            export SCRAPER_LIMITER_COOLDOWN_SECONDS="45"
            export SCRAPER_LIMITER_MAX_COOLDOWN_SECONDS="180"
            export SCRAPER_MAX_LIMITER_STREAK="3"
            export SCRAPER_ABORT_ON_PAGE1_LIMITED="true"
            workers="${SCRAPER_WORKERS:-1}"
            mode_label="INCREMENTAL ${REFRESH_DISCOVERY_MODE^^} DISCOVERY"
            args=(
              --mode "${REFRESH_DISCOVERY_MODE}"
              --workers "${workers}"
              --batch-size 3
              --page-delay "${SCRAPER_LISTING_DELAY_SECONDS}"
              --album-delay "${SCRAPER_DETAIL_DELAY_SECONDS}"
              --retry-count "${SCRAPER_MAX_ATTEMPTS}"
              --retry-base-delay "${SCRAPER_RETRY_BASE_DELAY_SECONDS}"
              --retry-max-delay "${SCRAPER_RETRY_MAX_DELAY_SECONDS}"
              --stop-after-known-pages 2
              --movie-index-stop-after-known-pages 120
              --max-limiter-streak "${SCRAPER_MAX_LIMITER_STREAK}"
              --abort-on-page1-limited
              --report-path "${REFRESH_REPORT}"
            )
          fi

          echo "::group::Refresh configuration"
          echo "  mode                  = $mode_label"
          echo "  discovery mode        = $REFRESH_DISCOVERY_MODE"
          echo "  workers               = $workers"
          echo "  batch_size            = 3"
          echo "  listing delay (s)     = $SCRAPER_LISTING_DELAY_SECONDS"
          echo "  detail delay (s)      = $SCRAPER_DETAIL_DELAY_SECONDS"
          echo "  jitter max (s)        = $SCRAPER_JITTER_SECONDS"
          echo "  max attempts          = $SCRAPER_MAX_ATTEMPTS"
          echo "  retry base delay (s)  = $SCRAPER_RETRY_BASE_DELAY_SECONDS"
          echo "  retry max delay (s)   = $SCRAPER_RETRY_MAX_DELAY_SECONDS"
          echo "  limiter cooldown(s)   = $SCRAPER_LIMITER_COOLDOWN_SECONDS"
          echo "  limiter max cdn(s)    = $SCRAPER_LIMITER_MAX_COOLDOWN_SECONDS"
          echo "  max limiter streak    = $SCRAPER_MAX_LIMITER_STREAK"
          echo "  abort page1 limited   = $SCRAPER_ABORT_ON_PAGE1_LIMITED"
          echo "  report path           = $REFRESH_REPORT"
          echo "::endgroup::"

          set +e
          python tools/masstamilan_refresh.py "${args[@]}"
          refresh_status=$?
          set -e

          if [[ $refresh_status -ne 0 ]]; then
            echo "::notice::MassTamilan source limiter detected. Previous live catalog is preserved; deploy/import will not run."
            if [[ -f "${REFRESH_REPORT}" ]]; then
              python - <<'PY'
          import json
          import os
          from pathlib import Path

          report = json.loads(Path(os.environ["REFRESH_REPORT"]).read_text(encoding="utf-8"))
          summary = report.get("summary") or {}
          print("Blocked/partial refresh summary")
          print(json.dumps({
              "status": report.get("status"),
              "success": report.get("success"),
              "blocked": report.get("blocked"),
              "partial": report.get("partial"),
              "errors": report.get("errors"),
              "warnings": report.get("warnings"),
              "listing_pages_scanned": summary.get("listing_pages_scanned"),
              "limited_pages": summary.get("challenged_pages"),
              "failed_pages": summary.get("failed_pages"),
              "limited_albums": summary.get("challenged_albums"),
              "failed_albums": summary.get("failed_albums"),
          }, indent=2, sort_keys=True))
          PY
              if python - <<'PY'
          import json
          import os
          from pathlib import Path

          report = json.loads(Path(os.environ["REFRESH_REPORT"]).read_text(encoding="utf-8"))
          status = str(report.get("status") or "").lower()
          if report.get("blocked") or report.get("partial") or status in {"blocked", "partial"}:
              raise SystemExit(0)
          raise SystemExit(1)
          PY
              then
                echo "skip_reason=blocked_or_partial_refresh" >> "$GITHUB_OUTPUT"
                echo "::notice::Refresh was blocked/partial, so publish is skipped and the active catalog remains unchanged."
                exit 0
              fi
            fi
            echo "::error::Unexpected refresh failure without a blocked/partial report."
            exit "$refresh_status"
          fi

          echo "publish_ready=true" >> "$GITHUB_OUTPUT"
          echo "skip_reason=" >> "$GITHUB_OUTPUT"
          echo "Refresh completed successfully."

      - name: Gate refresh report before publish
        if: steps.refresh.outputs.publish_ready == 'true'
        run: |
          set -euo pipefail
          if [[ ! -f "${REFRESH_REPORT}" ]]; then
            echo "::error::Refresh report missing; refusing to publish."
            exit 1
          fi
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          report_path = Path(os.environ["REFRESH_REPORT"])
          report = json.loads(report_path.read_text(encoding="utf-8"))

          summary = report.get("summary") or {}
          blocked = bool(report.get("blocked"))
          partial = bool(report.get("partial"))
          limited_pages = int(summary.get("challenged_pages", 0) or 0)
          limited_albums = int(summary.get("challenged_albums", 0) or 0)
          failed_pages = int(summary.get("failed_pages", 0) or 0)
          failed_albums = int(summary.get("failed_albums", 0) or 0)
          print("Refresh publish gate")
          payload = {
              "status": report.get("status"),
              "success": report.get("success"),
              "blocked": blocked,
              "partial": partial,
              "errors": report.get("errors"),
              "warnings": report.get("warnings"),
              "listing_pages_scanned": summary.get("listing_pages_scanned"),
              "movie_index_pages_scanned": summary.get("movie_index_pages_scanned"),
              "albums_added": summary.get("albums_added"),
              "albums_updated": summary.get("albums_updated"),
              "limited_pages": limited_pages,
              "failed_pages": failed_pages,
              "limited_albums": limited_albums,
              "failed_albums": failed_albums,
          }
          print(json.dumps(payload, indent=2, sort_keys=True))
          if not report.get("success") or blocked or partial or limited_pages or limited_albums or failed_pages or failed_albums:
              raise SystemExit("Refresh was blocked or partial; previous live catalog is preserved and deploy is skipped.")
          PY

      - name: Validate refreshed local catalog files
        if: steps.refresh.outputs.publish_ready == 'true'
        run: |
          set -euo pipefail
          if [[ ! -f data/sruthi.db ]]; then
            echo "::error::Expected data/sruthi.db to exist after refresh."
            exit 1
          fi
          if [[ ! -s data/sruthi.db ]]; then
            echo "::error::data/sruthi.db exists but is empty."
            exit 1
          fi
          python cloudflare/scripts/validate_refresh_health.py \
            --baseline "${BASELINE_DB}" \
            --refreshed data/sruthi.db \
            --min-coverage 0.85 \
            --min-url-coverage 0.95

      - name: Validate catalog and build release seed
        if: steps.refresh.outputs.publish_ready == 'true'
        run: |
          set -euo pipefail
          run_prepare_release() {
            python cloudflare/scripts/prepare_release.py \
              --db data/sruthi.db \
              --seed cloudflare/data/seed.sql \
              --baseline cloudflare/data/release-baseline.json \
              --manifest "${RELEASE_MANIFEST}" \
              --duckdb-path "${RELEASE_DUCKDB}"
          }

          set +e
          run_prepare_release
          prepare_status=$?
          set -e

          if [[ $prepare_status -ne 0 ]]; then
            echo "::error::Fresh source catalogue failed release validation with status ${prepare_status}. Previous live catalog is preserved; deploy/import will not run."
            exit "$prepare_status"
          fi

          if [[ ! -f cloudflare/data/seed.sql ]]; then
            echo "::error::Release seed was not generated."
            exit 1
          fi
          if [[ ! -s cloudflare/data/seed.sql ]]; then
            echo "::error::Release seed was generated but is empty."
            exit 1
          fi
          if [[ ! -f "${RELEASE_MANIFEST}" ]]; then
            echo "::error::Release manifest was not generated."
            exit 1
          fi
          python cloudflare/scripts/validate_generated_data.py \
            --data-dir cloudflare/data \
            --source-db data/sruthi.db \
            --baseline cloudflare/data/release-baseline.json

      - name: Upload build artifacts
        if: steps.refresh.outputs.publish_ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sruthi-release
          if-no-files-found: error
          path: |
            cloudflare/data/schema.sql
            cloudflare/data/seed.sql
            cloudflare/data/albums.ndjson
            cloudflare/data/songs.ndjson
            ${{ env.RELEASE_MANIFEST }}
            ${{ env.REFRESH_REPORT }}

      - name: Import release into inactive D1 slot
        if: steps.refresh.outputs.publish_ready == 'true'
        run: |
          set -euo pipefail
          wrangler d1 execute "${TARGET_DB_NAME}" \
            --remote \
            --file cloudflare/data/seed.sql \
            --config "${GENERATED_WRANGLER_CONFIG}"

      - name: Validate inactive D1 slot
        if: steps.refresh.outputs.publish_ready == 'true'
        run: |
          set -euo pipefail
          python cloudflare/scripts/validate_release.py \
            --mode d1 \
            --database-name "${TARGET_DB_NAME}" \
            --config "${GENERATED_WRANGLER_CONFIG}" \
            --manifest "${RELEASE_MANIFEST}" \
            --baseline cloudflare/data/release-baseline.json

      - name: Deploy Worker after successful import and validation
        if: steps.refresh.outputs.publish_ready == 'true'
        run: |
          set -euo pipefail
          wrangler deploy --config "${GENERATED_WRANGLER_CONFIG}"

      - name: Validate deployed Worker
        if: steps.refresh.outputs.publish_ready == 'true' && env.SRUTHI_WORKER_URL != ''
        run: |
          set -euo pipefail
          python cloudflare/scripts/validate_release.py \
            --mode http \
            --url "${SRUTHI_WORKER_URL}" \
            --baseline cloudflare/data/release-baseline.json

      - name: Report skipped deployed Worker validation
        if: steps.refresh.outputs.publish_ready == 'true' && env.SRUTHI_WORKER_URL == ''
        run: |
          echo "::notice::SRUTHI_WORKER_URL is not configured, so post-deploy HTTP smoke validation was skipped."

      - name: Mark deployed D1 slot as active
        if: steps.refresh.outputs.publish_ready == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_VARIABLES_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "::error::Missing required secret GH_VARIABLES_TOKEN. Cannot mark the active D1 slot."
            exit 1
          fi

          if [[ "${TARGET_SLOT}" != "A" && "${TARGET_SLOT}" != "B" ]]; then
            echo "::error::Refusing to write invalid TARGET_SLOT '${TARGET_SLOT}'. Expected A or B."
            exit 1
          fi

          echo "Updating SRUTHI_ACTIVE_D1_SLOT to '${TARGET_SLOT}'."

          set +e
          gh api \
            --method PATCH \
            "repos/${GITHUB_REPOSITORY}/actions/variables/SRUTHI_ACTIVE_D1_SLOT" \
            -f name=SRUTHI_ACTIVE_D1_SLOT \
            -f value="${TARGET_SLOT}" >/tmp/slot-patch.out 2>/tmp/slot-patch.err
          patch_status=$?
          set -e

          if [[ $patch_status -eq 0 ]]; then
            echo "Updated SRUTHI_ACTIVE_D1_SLOT successfully."
            exit 0
          fi

          if grep -q "404" /tmp/slot-patch.err; then
            echo "SRUTHI_ACTIVE_D1_SLOT does not exist yet. Creating it now."
            gh api \
              --method POST \
              "repos/${GITHUB_REPOSITORY}/actions/variables" \
              -f name=SRUTHI_ACTIVE_D1_SLOT \
              -f value="${TARGET_SLOT}" >/tmp/slot-create.out 2>/tmp/slot-create.err
            echo "Created SRUTHI_ACTIVE_D1_SLOT successfully."
            exit 0
          fi

          echo "::error::Failed to update SRUTHI_ACTIVE_D1_SLOT."
          cat /tmp/slot-patch.err
          exit 1

      - name: Report skipped publish
        if: steps.refresh.outputs.publish_ready != 'true'
        env:
          SKIP_REASON: ${{ steps.refresh.outputs.skip_reason }}
        run: |
          set -euo pipefail
          echo "Publish/deploy skipped: ${SKIP_REASON:-refresh_not_publishable}"
          echo "The previous live D1 slot remains active; no broken or incomplete catalog was deployed."
