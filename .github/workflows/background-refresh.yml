name: Refresh Library Snapshot

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:
    inputs:
      scan_mode:
        description: "Scrape mode passed to refresh_catalog.py"
        required: false
        default: "all"
      full_refresh:
        description: "Run full catalog refresh"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      delay:
        description: "Delay between page fetches"
        required: false
        default: "1.3"
      publish_ref:
        description: "Git ref used for manifest updates and push target"
        required: false
        default: "main"

permissions:
  contents: write
  actions: write

concurrency:
  group: catalog-refresh
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      SRUTHI_FULL_REFRESH: ${{ github.event.inputs.full_refresh || vars.SRUTHI_FULL_REFRESH || 'false' }}
      SRUTHI_REFRESH_WORKERS: ${{ vars.SRUTHI_REFRESH_WORKERS || '' }}
      SRUTHI_REFRESH_BATCH_SIZE: ${{ vars.SRUTHI_REFRESH_BATCH_SIZE || '' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.publish_ref || 'main' }}
          fetch-depth: 0

      - name: Define retry helper
        run: |
          cat > /tmp/retry.sh <<'EOF'
          retry() {
            local attempts="$1"
            local sleep_seconds="$2"
            shift 2
            local n=1
            while true; do
              "$@" && break
              if [ "$n" -ge "$attempts" ]; then
                echo "Command failed after $n attempt(s): $*"
                return 1
              fi
              echo "Attempt $n failed. Retrying in ${sleep_seconds}s: $*"
              sleep "$sleep_seconds"
              n=$((n + 1))
            done
          }
          EOF

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install scraper dependencies
        run: |
          source /tmp/retry.sh
          retry 3 20 python -m pip install --upgrade pip
          retry 3 30 python -m pip install -r apps/api/requirements.txt
          retry 3 30 npm install

      - name: Ensure data directories exist
        run: mkdir -p data exports apps/api/data .github/.generated/background-refresh

      - name: Resolve workflow paths
        run: |
          echo "WORKING_SQLITE_DB=${GITHUB_WORKSPACE}/data/melodify.sqlite3" >> "$GITHUB_ENV"
          echo "GENERATED_MANIFEST=${GITHUB_WORKSPACE}/.github/.generated/background-refresh/library-manifest.json" >> "$GITHUB_ENV"
          echo "VALIDATION_SUMMARY=${GITHUB_WORKSPACE}/.github/.generated/background-refresh/validation-summary.json" >> "$GITHUB_ENV"
          echo "REFRESH_REPORT=${GITHUB_WORKSPACE}/.github/.generated/background-refresh/refresh-report.json" >> "$GITHUB_ENV"
          echo "REFRESH_LOG=${GITHUB_WORKSPACE}/.github/.generated/background-refresh/refresh.log" >> "$GITHUB_ENV"

      - name: Resolve refresh settings
        run: |
          workers="${SRUTHI_REFRESH_WORKERS}"
          if [ -z "${workers}" ]; then
            workers="$(python - <<'PY'
          import os
          print(max(4, os.cpu_count() or 4))
          PY
            )"
          fi
          batch_size="${SRUTHI_REFRESH_BATCH_SIZE}"
          if [ -z "${batch_size}" ]; then
            batch_size="$((workers * 4))"
          fi
          if [ "${SRUTHI_FULL_REFRESH}" = "true" ]; then
            full_flag="--full"
          else
            full_flag=""
          fi
          echo "REFRESH_WORKERS=${workers}" >> "$GITHUB_ENV"
          echo "REFRESH_BATCH_SIZE=${batch_size}" >> "$GITHUB_ENV"
          echo "FULL_FLAG=${full_flag}" >> "$GITHUB_ENV"
          echo "Refresh mode: ${SRUTHI_FULL_REFRESH}"
          echo "Workers: ${workers}"
          echo "Batch size: ${batch_size}"

      - name: Ensure library release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view library-snapshot --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1 || \
            gh release create library-snapshot --repo "${GITHUB_REPOSITORY}" --title "Library Snapshot" --notes "Managed SQLite library snapshot release"

      - name: Download current published DB
        run: |
          source /tmp/retry.sh
          DOWNLOAD_URL="$(python - <<'PY'
          import json
          from pathlib import Path
          manifest = json.loads(Path("apps/api/data/library-manifest.json").read_text())
          print(manifest["download_url"])
          PY
          )"
          retry 3 20 curl -fL --retry 3 --retry-delay 20 -o "${WORKING_SQLITE_DB}" "${DOWNLOAD_URL}"

      - name: Back up current published DB
        uses: actions/upload-artifact@v4
        with:
          name: sqlite-backup-${{ github.run_id }}
          path: ${{ env.WORKING_SQLITE_DB }}
          retention-days: 30

      - name: Run scraper
        env:
          INPUT_SCAN_MODE: ${{ github.event.inputs.scan_mode || 'all' }}
          INPUT_DELAY: ${{ github.event.inputs.delay || '1.3' }}
          DATABASE_PATH: ${{ env.WORKING_SQLITE_DB }}
          MASSTAMILAN_USE_PLAYWRIGHT: "false"
        working-directory: apps/api
        run: |
          set -o pipefail
          python -m app.scripts.refresh_catalog \
            --mode "${INPUT_SCAN_MODE}" \
            --delay "${INPUT_DELAY}" \
            --workers "${REFRESH_WORKERS}" \
            --batch-size "${REFRESH_BATCH_SIZE}" \
            --report-path "${REFRESH_REPORT}" \
            ${FULL_FLAG} 2>&1 | tee "${REFRESH_LOG}"

      - name: Upload refresh artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: refresh-report-${{ github.run_id }}
          path: |
            ${{ env.REFRESH_REPORT }}
            ${{ env.REFRESH_LOG }}
            ${{ env.VALIDATION_SUMMARY }}
          if-no-files-found: warn
          retention-days: 30

      - name: Validate refreshed local catalog files
        run: |
          if [[ ! -f "${WORKING_SQLITE_DB}" ]]; then
            echo "::error::Expected ${WORKING_SQLITE_DB} to exist after refresh."
            exit 1
          fi
          if [[ ! -s "${WORKING_SQLITE_DB}" ]]; then
            echo "::error::${WORKING_SQLITE_DB} exists but is empty."
            exit 1
          fi
          python scripts/validate_snapshot_with_duckdb.py \
            --db-path "${WORKING_SQLITE_DB}" \
            --previous-manifest apps/api/data/library-manifest.json \
            --summary-path "${VALIDATION_SUMMARY}"

      - name: Build app before publish
        run: npm run build

      - name: Build release manifest
        run: |
          VERSION="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          python scripts/publish_snapshot_manifest.py \
            --db-path "${WORKING_SQLITE_DB}" \
            --manifest-path "${GENERATED_MANIFEST}" \
            --download-url "https://github.com/${GITHUB_REPOSITORY}/releases/download/library-snapshot/vibe2o-library.sqlite3" \
            --version "${VERSION}"

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload library-snapshot "${WORKING_SQLITE_DB}#vibe2o-library.sqlite3" --repo "${GITHUB_REPOSITORY}" --clobber

      - name: Publish committed manifest
        run: |
          cp "${GENERATED_MANIFEST}" apps/api/data/library-manifest.json

      - name: Detect repository changes
        id: changes
        run: |
          if git diff --quiet -- apps/api/data/library-manifest.json; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
          else
            echo "changed=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Commit refreshed library
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/api/data/library-manifest.json
          git commit -m "chore(data): refresh library manifest"

      - name: Push refreshed library
        if: steps.changes.outputs.changed == 'true'
        env:
          PUBLISH_REF: ${{ github.event.inputs.publish_ref || 'main' }}
        run: |
          for attempt in 1 2 3 4 5; do
            if git push origin "HEAD:${PUBLISH_REF}"; then
              echo "Pushed on attempt ${attempt}."
              exit 0
            fi
            echo "Push rejected on attempt ${attempt}; rebasing onto origin/${PUBLISH_REF}."
            git fetch origin "${PUBLISH_REF}"
            git rebase "origin/${PUBLISH_REF}"
            sleep 5
          done
          echo "Failed to push after 5 attempts." >&2
          exit 1

      - name: Summarize refresh
        if: always()
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          report_path = Path(os.environ["REFRESH_REPORT"])
          validation_path = Path(os.environ["VALIDATION_SUMMARY"])
          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])

          report = {}
          validation = {}
          if report_path.exists():
              report = json.loads(report_path.read_text())
          if validation_path.exists():
              validation = json.loads(validation_path.read_text())

          summary = report.get("summary", {})
          lines = []
          lines.append("# Catalog Refresh Summary")
          lines.append("")
          lines.append(f"- Mode: `{report.get('mode', 'unknown')}`")
          lines.append(f"- Status: `{report.get('status', 'unknown')}`")
          lines.append(f"- Duration: `{report.get('durationSeconds', 'n/a')}` seconds")
          lines.append(f"- Listing pages scanned: `{summary.get('listing_pages_scanned', 0)}`")
          lines.append(f"- Movie index pages scanned: `{summary.get('movie_index_pages_scanned', 0)}`")
          lines.append(f"- Section pages scanned: `{summary.get('section_pages_scanned', 0)}`")
          lines.append(f"- Year pages scanned: `{summary.get('year_pages_scanned', 0)}`")
          lines.append(f"- Albums added: `{summary.get('albums_added', 0)}`")
          lines.append(f"- Albums updated: `{summary.get('albums_updated', 0)}`")
          lines.append(f"- Tracks added: `{summary.get('tracks_added', 0)}`")
          lines.append(f"- Tracks updated: `{summary.get('tracks_updated', 0)}`")
          lines.append(f"- Challenged pages: `{summary.get('challenged_pages', 0)}`")
          lines.append(f"- Challenged albums: `{summary.get('challenged_albums', 0)}`")
          lines.append(f"- Failed albums: `{summary.get('albums_failed', 0)}`")
          lines.append("")

          warnings = report.get("warnings", [])
          errors = report.get("errors", [])
          if warnings:
              lines.append("## Warnings")
              for warning in warnings[:10]:
                  lines.append(f"- {warning}")
              lines.append("")
          if errors:
              lines.append("## Errors")
              for error in errors[:10]:
                  lines.append(f"- {error}")
              lines.append("")

          if validation:
              checks = validation.get("checks", {})
              lines.append("## Validation")
              lines.append(f"- Snapshot validation: `{checks.get('ok', False)}`")
              lines.append(f"- Songs: `{validation.get('stats', {}).get('songs', 0)}`")
              lines.append(f"- Albums: `{validation.get('stats', {}).get('albums', 0)}`")
              lines.append("")

          summary_path.write_text("\n".join(lines) + "\n")
          print("\n".join(lines))
          PY
